name: Build Space Xit VIP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Instalar Dependências e Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git lua5.3 liblua5.3-dev libarchive-dev python3
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # Download do SDK com comando de segurança
          curl -kL https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o ~/sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xf ~/sdk.tar.xz -C ~/theos/sdks/
          rm ~/sdk.tar.xz

      - name: Fix Formato (Anti-Error 25)
        run: |
          sed -i 's/\r$//' control
          sed -i 's/\r$//' Makefile
          sed -i 's/\r$//' *.plist
          echo "" >> control

      - name: Compilar Dylib
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: SpaceXit-Dylib-Pack
          path: packages/*.deb
