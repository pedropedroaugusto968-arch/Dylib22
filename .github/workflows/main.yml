name: Space-Xit-Compiler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-12

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Usar SDK do Sistema
        run: |
          # Usa o SDK nativo do macOS que ja funciona para iOS basico
          mkdir -p ~/theos/sdks
          ln -s /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk ~/theos/sdks/iPhoneOS.sdk

      - name: Compilando SpaceXit Dylib
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Armazenar Dylib Pronta
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit-Output
          path: packages/*.deb
