name: Space-Xit-Compiler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Theos e SDK
        run: |
          export THEOS=~/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz | tar -xf - -C $THEOS/sdks
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Compilando SpaceXit Dylib
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Armazenar Dylib Pronta
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit-Output
          path: packages/*.deb
