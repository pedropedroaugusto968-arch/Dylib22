name: Build Space Xit VIP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Instalar Dependências e Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential checkinstall git lua5.3 liblua5.3-dev libarchive-dev python3
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks/
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Corrigir Formato dos Arquivos (Fix Error 25)
        run: |
          # Remove espaços invisíveis e corrige quebras de linha do Windows
          sed -i 's/\r$//' control
          sed -i 's/\r$//' Makefile
          sed -i 's/\r$//' *.plist
          # Garante que o arquivo control termine com uma linha vazia (exigência do Theos)
          echo "" >> control

      - name: Compilar Tweak (Space Xit)
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1

      - name: Upload da Dylib e Deb
        uses: actions/upload-artifact@v3
        with:
          name: SpaceXit-Premium-1.123.1
          path: packages/*.deb
