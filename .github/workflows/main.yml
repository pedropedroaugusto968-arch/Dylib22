name: SpaceXit_V4_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git dpkg-dev xz-utils
          sudo curl -kL "https://github.com/theos/binaries/raw/master/linux/x86_64/ldid" -o /usr/local/bin/ldid
          sudo chmod +x /usr/local/bin/ldid
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Baixar SDK (Link Blindado)
        run: |
          mkdir -p ~/theos/sdks
          # Usando o servidor do Dhowett que é o mais estável do mundo
          curl -kL "https://github.com/Dhowett/Theos-SDKs/raw/master/iPhoneOS14.5.sdk.tar.xz" -o ~/theos/sdks/sdk.tar.xz
          
          # Verifica se o arquivo tem mais de 1MB (pra ter certeza que não é erro 404)
          FILESIZE=$(stat -c%s "~/theos/sdks/sdk.tar.xz")
          if [ $FILESIZE -lt 1000000 ]; then echo "ERRO: O SDK baixou errado (404). Tentando link reserva..."; curl -kL "https://bit.ly/sdkiOS145" -o ~/theos/sdks/sdk.tar.xz; fi
          
          cd ~/theos/sdks/
          tar -xf sdk.tar.xz && rm sdk.tar.xz

      - name: Compilar dylib
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make clean package FINALPACKAGE=1

      - name: Link de Download
        run: |
          echo "LINK DA SUA DYLIB:"
          curl --upload-file packages/*.deb https://transfer.sh/SpaceXitV4.deb
