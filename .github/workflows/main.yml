name: Space-Xit-Compiler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Dependencias Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl perl git libssl-dev

      - name: Instalar Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Instalar SDK
        run: |
          mkdir -p ~/theos/sdks
          curl -ksL https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o ~/sdk.tar.xz
          tar -xf ~/sdk.tar.xz -C ~/theos/sdks
          
      - name: Compilando SpaceXit Dylib
        run: |
          export THEOS=~/theos
          $THEOS/bin/make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Armazenar Dylib Pronta
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit-Output
          path: packages/*.deb
