name: Build Space Xit VIP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git lua5.3 liblua5.3-dev libarchive-dev python3
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Baixar SDK (Link Alternativo)
        run: |
          mkdir -p ~/theos/sdks
          # Usando o link do repositório de SDKs pronto
          curl -ksL https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o ~/sdk.tar.xz
          tar -xf ~/sdk.tar.xz -C ~/theos/sdks/
          rm ~/sdk.tar.xz

      - name: Limpar Formato (Anti-Error 25)
        run: |
          sed -i 's/\r$//' control
          sed -i 's/\r$//' Makefile
          find . -name "*.plist" -exec sed -i 's/\r$//' {} +
          echo "" >> control

      - name: Compilar Space Xit
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1

      - name: Upload Artifacts (v4)
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit-Premium-Pack
          path: packages/*.deb
