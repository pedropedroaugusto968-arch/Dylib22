name: Build Space Xit

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Instalar Theos e SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git lua5.3 liblua5.3-dev libarchive-dev python3
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -ksL https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o ~/sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xf ~/sdk.tar.xz -C ~/theos/sdks/

      - name: Fix Arquivos
        run: |
          sed -i 's/\r$//' control
          sed -i 's/\r$//' Makefile
          echo "" >> control

      - name: Compilar
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: SpaceXit-Dylib
          path: packages/*.deb
