name: Compilar SucSoft iOS
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Instalar Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
      - name: Compilar Dylib
        run: |
          make package
      - name: Upload da Dylib
        uses: actions/upload-artifact@v4
        with:
          name: SucSoft-iOS-Gomes
          path: packages/*.deb
